<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Slice - Vibe Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-wrapper {
            position: relative;
            height: 100vh;
            aspect-ratio: 9/16;
            background-color: #000;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10;
        }

        .btn-neon {
            pointer-events: auto;
            background: transparent;
            color: #00ffff;
            border: 2px solid #00ffff;
            padding: 15px 40px;
            font-size: 24px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px #00ffff inset, 0 0 20px #00ffff;
            transition: all 0.2s;
        }

        .btn-neon:hover, .btn-neon:active {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 25px #00ffff inset, 0 0 40px #00ffff;
        }

        .hidden {
            display: none !important;
        }

        .text-glow-red {
            text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055, 0 0 30px #ff0055;
            color: #fff;
        }

        .text-glow-cyan {
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            color: #fff;
        }

        .text-glow-gold {
            text-shadow: 0 0 10px #ffcc00, 0 0 20px #ffcc00;
            color: #fff;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shake-constant {
            animation: shake 0.5s;
            animation-iteration-count: infinite;
            display: inline-block;
        }

        :fullscreen, :-webkit-full-screen {
            background-color: #050510;
        }

        body.pseudo-fullscreen {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
        }

        #top-controls {
            position: absolute;
            top: 18px;
            left: 18px;
            right: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            pointer-events: none;
        }

        .top-controls-right {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            pointer-events: auto;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid #00ffff;
            color: #00ffff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            transition: all 0.2s;
        }

        .icon-btn:hover, .icon-btn:active {
            background: rgba(0, 255, 255, 0.25);
            box-shadow: 0 0 18px rgba(0, 255, 255, 0.8);
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>

        <div id="ui-layer">
            <div id="top-controls">
                <button id="home-btn" class="icon-btn" title="Voltar ao início"><i class="fa-solid fa-house" aria-hidden="true"></i></button>
                <div class="top-controls-right">
                    <button id="mute-btn" class="icon-btn" title="Ativar/desativar som"><i class="fa-solid fa-volume-high" aria-hidden="true"></i></button>
                    <button id="fullscreen-btn" class="icon-btn" title="Tela cheia"><i class="fa-solid fa-expand" aria-hidden="true"></i></button>
                </div>
            </div>

            <div id="start-screen" class="flex flex-col items-center justify-center w-full h-full px-6">
                <h1 class="text-5xl font-black mb-2 text-glow-cyan text-center">NEON<br>SLICE</h1>
                <p class="mb-1 text-gray-300 text-sm tracking-widest text-center">DESLIZE PARA CORTAR AS FRUTAS</p>
                <p class="mb-10 text-red-400 text-xs tracking-widest text-center"><i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i> EVITE AS BOMBAS <i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i></p>
                <button id="start-btn" class="btn-neon">START GAME</button>
            </div>

            <div id="game-over-screen" class="hidden flex flex-col items-center w-full px-4 text-center">
                <h2 id="game-over-title" class="text-3xl font-black text-glow-red mb-4">LÂMINA QUEBRADA</h2>
                <div class="bg-gray-900 bg-opacity-80 p-6 rounded-lg border border-cyan-500 shadow-[0_0_15px_#00ffff] mb-8 w-full max-w-sm">
                    <p class="text-xl text-cyan-300 mb-2">FINAL SCORE</p>
                    <p id="final-score" class="text-5xl font-bold text-white text-glow-cyan">0</p>
                </div>
                <button id="restart-btn" class="btn-neon">TRY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiLayer = document.getElementById('ui-layer');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');
        const gameOverTitle = document.getElementById('game-over-title');

        // ==================== SOUND ENGINE (Web Audio API) ====================
        const SoundEngine = (() => {
            let ctx = null;
            let masterGain, musicGain, sfxGain, compressor;
            let noiseBuffer = null;

            let musicTimerID = null;
            let nextNoteTime = 0;
            let step = 0;
            let tempo = 92;
            let danger = false;
            const lookahead = 25.0;
            const scheduleAheadTime = 0.12;

            let lastSwoosh = 0;

            function ensureCtx() {
                if (!ctx) {
                    ctx = new (window.AudioContext || window.webkitAudioContext)();

                    masterGain = ctx.createGain();
                    masterGain.gain.value = 0.7;

                    compressor = ctx.createDynamicsCompressor();
                    compressor.threshold.value = -18;
                    compressor.ratio.value = 12;
                    compressor.connect(ctx.destination);

                    masterGain.connect(compressor);

                    musicGain = ctx.createGain();
                    musicGain.gain.value = 0.22;
                    musicGain.connect(masterGain);

                    sfxGain = ctx.createGain();
                    sfxGain.gain.value = 0.9;
                    sfxGain.connect(masterGain);

                    noiseBuffer = createNoiseBuffer();
                }
            }

            function createNoiseBuffer() {
                const bufferSize = ctx.sampleRate * 1;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                return buffer;
            }

            function init() {
                ensureCtx();
                if (ctx.state === 'suspended') ctx.resume();
            }

            function noiseSource() {
                const src = ctx.createBufferSource();
                src.buffer = noiseBuffer;
                return src;
            }

            // ---------- One-shot SFX ----------
            function playSwoosh() {
                if (!ctx) return;
                const now = ctx.currentTime;
                if (now - lastSwoosh < 0.07) return;
                lastSwoosh = now;

                const src = noiseSource();
                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.setValueAtTime(1800 + Math.random() * 800, now);
                filter.Q.value = 0.8;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.0001, now);
                gain.gain.exponentialRampToValueAtTime(0.12, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
                src.connect(filter);
                filter.connect(gain);
                gain.connect(sfxGain);
                src.start(now);
                src.stop(now + 0.13);
            }

            function playSlice(comboCount) {
                if (!ctx) return;
                const t = ctx.currentTime;
                const pitch = Math.min(1 + comboCount * 0.12, 2.2);

                const src = noiseSource();
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 1500;
                const nGain = ctx.createGain();
                nGain.gain.setValueAtTime(0.25, t);
                nGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
                src.connect(filter);
                filter.connect(nGain);
                nGain.connect(sfxGain);
                src.start(t);
                src.stop(t + 0.1);

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(520 * pitch, t);
                osc.frequency.exponentialRampToValueAtTime(180 * pitch, t + 0.15);
                gain.gain.setValueAtTime(0.0001, t);
                gain.gain.exponentialRampToValueAtTime(0.35, t + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
                osc.connect(gain);
                gain.connect(sfxGain);
                osc.start(t);
                osc.stop(t + 0.2);
            }

            function playCombo(comboCount) {
                if (!ctx) return;
                const t = ctx.currentTime;
                const base = 440 + Math.min(comboCount, 8) * 40;
                [0, 1, 2].forEach(i => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = base * Math.pow(1.26, i);
                    const start = t + i * 0.06;
                    gain.gain.setValueAtTime(0.0001, start);
                    gain.gain.exponentialRampToValueAtTime(0.28, start + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.22);
                    osc.connect(gain);
                    gain.connect(sfxGain);
                    osc.start(start);
                    osc.stop(start + 0.25);
                });
            }

            function playMissLife() {
                if (!ctx) return;
                const t = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(260, t);
                osc.frequency.exponentialRampToValueAtTime(90, t + 0.25);
                gain.gain.setValueAtTime(0.0001, t);
                gain.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
                osc.connect(gain);
                gain.connect(sfxGain);
                osc.start(t);
                osc.stop(t + 0.32);
            }

            function playBombExplode() {
                if (!ctx) return;
                const t = ctx.currentTime;

                const src = noiseSource();
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(3000, t);
                filter.frequency.exponentialRampToValueAtTime(80, t + 0.6);
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.8, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
                src.connect(filter);
                filter.connect(gain);
                gain.connect(sfxGain);
                src.start(t);
                src.stop(t + 0.6);

                const osc = ctx.createOscillator();
                const oGain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(140, t);
                osc.frequency.exponentialRampToValueAtTime(25, t + 0.5);
                oGain.gain.setValueAtTime(0.9, t);
                oGain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
                osc.connect(oGain);
                oGain.connect(sfxGain);
                osc.start(t);
                osc.stop(t + 0.55);
            }

            function playStart() {
                if (!ctx) return;
                const t = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, t);
                osc.frequency.exponentialRampToValueAtTime(880, t + 0.3);
                gain.gain.setValueAtTime(0.0001, t);
                gain.gain.exponentialRampToValueAtTime(0.3, t + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
                osc.connect(gain);
                gain.connect(sfxGain);
                osc.start(t);
                osc.stop(t + 0.4);
            }

            function playGameOver() {
                if (!ctx) return;
                const t = ctx.currentTime;
                [392.00, 329.63, 261.63, 196.00].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.value = freq;
                    const start = t + i * 0.18;
                    gain.gain.setValueAtTime(0.0001, start);
                    gain.gain.exponentialRampToValueAtTime(0.3, start + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.35);
                    osc.connect(gain);
                    gain.connect(sfxGain);
                    osc.start(start);
                    osc.stop(start + 0.4);
                });
            }

            // ---------- Background music (step sequencer, lookahead scheduler) ----------
            function scheduleBassNote(freq, time, dur) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = danger ? 900 : 450;
                osc.type = danger ? 'sawtooth' : 'triangle';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.0001, time);
                gain.gain.exponentialRampToValueAtTime(0.3, time + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(musicGain);
                osc.start(time);
                osc.stop(time + dur + 0.05);
            }

            function scheduleHat(time, loud) {
                const src = noiseSource();
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 7000;
                const gain = ctx.createGain();
                gain.gain.setValueAtTime(loud ? 0.14 : 0.06, time);
                gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.05);
                src.connect(filter);
                filter.connect(gain);
                gain.connect(musicGain);
                src.start(time);
                src.stop(time + 0.06);
            }

            function scheduleKick(time) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, time);
                osc.frequency.exponentialRampToValueAtTime(45, time + 0.15);
                gain.gain.setValueAtTime(0.45, time);
                gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.18);
                osc.connect(gain);
                gain.connect(musicGain);
                osc.start(time);
                osc.stop(time + 0.2);
            }

            const scale = [196.00, 220.00, 246.94, 261.63, 293.66, 329.63];

            function scheduleStep(stepIndex, time) {
                const secondsPerBeat = 60.0 / tempo;

                if (stepIndex % 4 === 0) {
                    scheduleBassNote(scale[0] / 2, time, secondsPerBeat * 0.9);
                }
                if (stepIndex % 8 === 0) scheduleKick(time);
                if (stepIndex % 8 === (danger ? 3 : 4)) scheduleKick(time);
                if (stepIndex % 2 === 0) scheduleHat(time, danger && stepIndex % 4 === 0);
            }

            function scheduler() {
                while (nextNoteTime < ctx.currentTime + scheduleAheadTime) {
                    scheduleStep(step, nextNoteTime);
                    const secondsPerBeat = 60.0 / tempo;
                    nextNoteTime += secondsPerBeat * 0.5;
                    step = (step + 1) % 16;
                }
                musicTimerID = setTimeout(scheduler, lookahead);
            }

            function startMusic() {
                ensureCtx();
                if (ctx.state === 'suspended') ctx.resume();
                stopMusic();
                danger = false;
                tempo = 92;
                step = 0;
                nextNoteTime = ctx.currentTime + 0.05;
                scheduler();
            }

            function stopMusic() {
                if (musicTimerID) {
                    clearTimeout(musicTimerID);
                    musicTimerID = null;
                }
            }

            function setDanger(active) {
                danger = active;
                tempo = active ? 128 : 92;
            }

            function setMuted(muted) {
                if (!ctx) return;
                masterGain.gain.setTargetAtTime(muted ? 0 : 0.7, ctx.currentTime, 0.05);
            }

            return {
                init, startMusic, stopMusic, setDanger, setMuted,
                playSwoosh, playSlice, playCombo, playMissLife, playBombExplode, playStart, playGameOver
            };
        })();

        const GAME_WIDTH = 540;
        const GAME_HEIGHT = 960;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        const GRAVITY = 0.32;
        const MAX_LIVES = 3;

        let gameState = 'START'; // START, PLAYING, GAMEOVER
        let gameEnding = false;
        let score = 0;
        let lives = MAX_LIVES;
        let shake = 0;
        let timeOffset = 0;

        let comboCount = 0;
        let comboTimer = 0;

        let fruits = [];
        let halves = [];
        let particles = [];
        let floatingTexts = [];
        let bladePoints = [];

        let spawnTimer = 0;
        let isSlicing = false;
        let lastFrameTime = 0;
        let frameScale = 1;

        const KIND_SPECS = {
            apple:      { radius: 30, points: 10, colorMain: '#ff2f55', colorGlow: '#ff2f55', juiceColor: '#ff8fa3' },
            orange:     { radius: 32, points: 10, colorMain: '#ff8f1f', colorGlow: '#ff8f1f', juiceColor: '#ffcf8a' },
            watermelon: { radius: 42, points: 15, colorMain: '#2ee06b', colorGlow: '#2ee06b', juiceColor: '#ff4d6d' },
            kiwi:       { radius: 26, points: 10, colorMain: '#9ad13a', colorGlow: '#c8ff6e', juiceColor: '#d7f28a' },
            banana:     { radius: 28, points: 10, colorMain: '#ffe135', colorGlow: '#ffe135', juiceColor: '#fff6c2' },
            star:       { radius: 28, points: 50, colorMain: '#ffd700', colorGlow: '#ffffaa', juiceColor: '#ffffff' },
            bomb:       { radius: 32, points: 0,  colorMain: '#151515', colorGlow: '#ff3300', juiceColor: '#ff3300' }
        };
        const FRUIT_KINDS = ['apple', 'orange', 'watermelon', 'kiwi', 'banana'];

        function drawStar(c, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let step = Math.PI / spikes;
            c.beginPath();
            c.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                let x = cx + Math.cos(rot) * outerRadius;
                let y = cy + Math.sin(rot) * outerRadius;
                c.lineTo(x, y);
                rot += step;
                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                c.lineTo(x, y);
                rot += step;
            }
            c.lineTo(cx, cy - outerRadius);
            c.closePath();
        }

        class FruitObject {
            constructor(kind, x) {
                const spec = KIND_SPECS[kind];
                this.kind = kind;
                this.x = x;
                this.y = GAME_HEIGHT + 50;
                this.radius = spec.radius;
                this.points = spec.points;
                this.colorMain = spec.colorMain;
                this.colorGlow = spec.colorGlow;
                this.juiceColor = spec.juiceColor;

                this.vx = (Math.random() - 0.5) * 4.2;
                const targetHeight = GAME_HEIGHT * 0.12 + Math.random() * GAME_HEIGHT * 0.5;
                const risingDistance = (GAME_HEIGHT + 50) - targetHeight;
                this.vy = -Math.sqrt(2 * GRAVITY * risingDistance) - Math.random() * 1.5;

                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.1;
                this.sliced = false;
                this.pulse = Math.random() * Math.PI * 2;
            }

            update(dt = 1) {
                this.vy += GRAVITY * dt;
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.rotation += this.rotSpeed * dt;
                this.pulse += 0.1 * dt;

                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -1;
                } else if (this.x + this.radius > GAME_WIDTH) {
                    this.x = GAME_WIDTH - this.radius;
                    this.vx *= -1;
                }
            }

            draw(c) {
                c.save();
                c.translate(this.x, this.y);
                c.rotate(this.rotation);
                c.shadowBlur = this.kind === 'bomb' ? (18 + Math.sin(this.pulse) * 8) : 16;
                c.shadowColor = this.kind === 'bomb' ? this.colorGlow : this.colorMain;

                switch (this.kind) {
                    case 'watermelon':
                        c.fillStyle = this.colorMain;
                        c.beginPath(); c.arc(0, 0, this.radius, 0, Math.PI * 2); c.fill();
                        c.strokeStyle = 'rgba(10,60,30,0.6)';
                        c.lineWidth = 4;
                        for (let a = -1; a <= 1; a++) {
                            c.beginPath();
                            c.arc(a * this.radius * 0.5, 0, this.radius * 0.85, 0.2, Math.PI - 0.2);
                            c.stroke();
                        }
                        break;
                    case 'kiwi':
                        c.fillStyle = this.colorMain;
                        c.beginPath(); c.arc(0, 0, this.radius, 0, Math.PI * 2); c.fill();
                        c.fillStyle = 'rgba(60,40,10,0.5)';
                        for (let i = 0; i < 8; i++) {
                            const a = (i / 8) * Math.PI * 2;
                            c.beginPath();
                            c.arc(Math.cos(a) * this.radius * 0.55, Math.sin(a) * this.radius * 0.55, 2.4, 0, Math.PI * 2);
                            c.fill();
                        }
                        break;
                    case 'banana':
                        c.fillStyle = this.colorMain;
                        c.beginPath();
                        c.moveTo(-this.radius * 1.3, this.radius * 0.5);
                        c.quadraticCurveTo(0, -this.radius * 1.4, this.radius * 1.3, -this.radius * 0.2);
                        c.quadraticCurveTo(0, -this.radius * 0.6, -this.radius * 1.3, this.radius * 0.5);
                        c.fill();
                        break;
                    case 'star':
                        c.fillStyle = this.colorMain;
                        drawStar(c, 0, 0, 5, this.radius, this.radius * 0.5);
                        c.fill();
                        break;
                    case 'bomb':
                        c.fillStyle = this.colorMain;
                        c.beginPath(); c.arc(0, 0, this.radius, 0, Math.PI * 2); c.fill();
                        c.strokeStyle = '#3a3a3a';
                        c.lineWidth = 3;
                        c.beginPath(); c.arc(0, 0, this.radius * 0.6, 0, Math.PI * 2); c.stroke();
                        c.strokeStyle = '#ffcc00';
                        c.lineWidth = 4;
                        c.beginPath();
                        c.moveTo(this.radius * 0.3, -this.radius * 0.8);
                        c.quadraticCurveTo(this.radius * 0.8, -this.radius * 1.4, this.radius * 1.3, -this.radius * 1.5);
                        c.stroke();
                        c.fillStyle = Math.sin(this.pulse * 2) > 0 ? '#ffaa00' : '#ff3300';
                        c.beginPath();
                        c.arc(this.radius * 1.3, -this.radius * 1.5, 5, 0, Math.PI * 2);
                        c.fill();
                        break;
                    default: // apple, orange
                        c.fillStyle = this.colorMain;
                        c.beginPath(); c.arc(0, 0, this.radius, 0, Math.PI * 2); c.fill();
                        c.fillStyle = 'rgba(255,255,255,0.15)';
                        c.beginPath(); c.arc(-this.radius * 0.3, -this.radius * 0.3, this.radius * 0.3, 0, Math.PI * 2); c.fill();
                        break;
                }

                c.shadowBlur = 0;
                c.restore();
            }
        }

        class FruitHalf {
            constructor(x, y, radius, color, juiceColor, rotation, vx, vy) {
                this.x = x; this.y = y; this.radius = radius;
                this.color = color; this.juiceColor = juiceColor;
                this.rotation = rotation;
                this.rotSpeed = (Math.random() - 0.5) * 0.35;
                this.vx = vx; this.vy = vy;
                this.life = 1;
            }
            update(dt = 1) {
                this.vy += GRAVITY * 0.6 * dt;
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.rotation += this.rotSpeed * dt;
                this.life -= 0.012 * dt;
            }
            draw(c) {
                c.save();
                c.globalAlpha = Math.max(0, this.life);
                c.translate(this.x, this.y);
                c.rotate(this.rotation);
                c.shadowBlur = 10;
                c.shadowColor = this.color;
                c.fillStyle = this.color;
                c.beginPath(); c.moveTo(0, 0); c.arc(0, 0, this.radius, 0, Math.PI); c.closePath(); c.fill();
                c.fillStyle = this.juiceColor;
                c.beginPath(); c.moveTo(0, 2); c.arc(0, 2, this.radius * 0.65, 0, Math.PI); c.closePath(); c.fill();
                c.shadowBlur = 0;
                c.restore();
                c.globalAlpha = 1;
            }
        }

        class Particle {
            constructor(x, y, color, spread = 5) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * spread + 1.5;
                this.dx = Math.cos(angle) * speed;
                this.dy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = Math.random() * 0.025 + 0.02;
                this.size = Math.random() * 4 + 2;
            }
            update(dt = 1) {
                this.vy = (this.vy || 0) + 0.12 * dt;
                this.x += this.dx * dt;
                this.y += (this.dy + this.vy) * dt;
                this.life -= this.decay * dt;
            }
            draw(c) {
                c.globalAlpha = Math.max(0, this.life);
                c.fillStyle = this.color;
                c.shadowBlur = 8;
                c.shadowColor = this.color;
                c.beginPath();
                c.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                c.fill();
                c.shadowBlur = 0;
                c.globalAlpha = 1.0;
            }
        }

        class FloatingText {
            constructor(x, y, text, color, size = 20) {
                this.x = x; this.y = y; this.text = text; this.color = color; this.size = size;
                this.life = 1.0;
                this.vy = -1.2;
            }
            update(dt = 1) {
                this.y += this.vy * dt;
                this.life -= 0.02 * dt;
            }
            draw(c) {
                c.globalAlpha = Math.max(0, this.life);
                c.textAlign = 'center';
                c.font = `bold ${this.size}px 'Orbitron'`;
                c.fillStyle = this.color;
                c.shadowColor = this.color;
                c.shadowBlur = 12;
                c.fillText(this.text, this.x, this.y);
                c.shadowBlur = 0;
                c.globalAlpha = 1.0;
            }
        }

        function createJuice(x, y, color, count) {
            for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color, 6));
        }

        function createExplosionParticles(x, y) {
            const colors = ['#ff3300', '#ff8800', '#ffcc00', '#333333'];
            for (let i = 0; i < 45; i++) {
                particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)], 9));
            }
        }

        function drawBackground() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(5, 5, 16, 0.3)';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            ctx.globalCompositeOperation = 'lighter';
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 1;

            timeOffset = (timeOffset + frameScale) % 100;

            ctx.beginPath();
            for (let x = 0; x <= GAME_WIDTH; x += 100) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, GAME_HEIGHT);
            }
            for (let y = timeOffset; y < GAME_HEIGHT; y += 100) {
                ctx.moveTo(0, y);
                ctx.lineTo(GAME_WIDTH, y);
            }
            ctx.stroke();

            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffff';
            ctx.beginPath();
            ctx.moveTo(2, 0); ctx.lineTo(2, GAME_HEIGHT);
            ctx.moveTo(GAME_WIDTH - 2, 0); ctx.lineTo(GAME_WIDTH - 2, GAME_HEIGHT);
            ctx.stroke();

            ctx.shadowBlur = 0;
            ctx.globalCompositeOperation = 'source-over';
        }

        function drawLives() {
            const startX = 35;
            const startY = 40;
            const gap = 30;
            for (let i = 0; i < MAX_LIVES; i++) {
                if (i < lives) {
                    ctx.fillStyle = '#ff00aa';
                    ctx.shadowColor = '#ff00aa';
                    ctx.shadowBlur = 10;
                } else {
                    ctx.fillStyle = '#333';
                    ctx.shadowBlur = 0;
                }
                ctx.beginPath();
                ctx.moveTo(startX + i * gap, startY - 10);
                ctx.lineTo(startX + i * gap + 10, startY);
                ctx.lineTo(startX + i * gap, startY + 10);
                ctx.lineTo(startX + i * gap - 10, startY);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }

        function drawHUD() {
            ctx.fillStyle = 'rgba(5, 5, 16, 0.85)';
            ctx.fillRect(0, 0, GAME_WIDTH, 70);
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ffff';
            ctx.beginPath();
            ctx.moveTo(0, 70);
            ctx.lineTo(GAME_WIDTH, 70);
            ctx.stroke();
            ctx.shadowBlur = 0;

            drawLives();

            ctx.textAlign = 'right';
            ctx.font = "bold 22px 'Orbitron'";
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 10;
            ctx.fillText(`SCORE: ${score}`, GAME_WIDTH - 15, 45);
            ctx.shadowBlur = 0;

            if (comboCount >= 2 && comboTimer > 0) {
                const pulse = 1 + Math.sin(Date.now() / 80) * 0.08;
                ctx.save();
                ctx.translate(GAME_WIDTH / 2, 115);
                ctx.scale(pulse, pulse);
                ctx.textAlign = 'center';
                ctx.font = "bold 28px 'Orbitron'";
                ctx.fillStyle = '#ffff00';
                ctx.shadowColor = '#ffff00';
                ctx.shadowBlur = 15;
                ctx.fillText(`COMBO x${comboCount}!`, 0, 0);
                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }

        function computeSpawnInterval() {
            const reduction = Math.min(45, Math.floor(score / 20));
            return Math.max(95 - reduction, 40);
        }

        function spawnObject() {
            const r = Math.random();
            const bombChance = Math.min(0.02 + score / 5000, 0.16);
            const starChance = 0.04;
            let kind;
            if (r < bombChance) kind = 'bomb';
            else if (r < bombChance + starChance) kind = 'star';
            else kind = FRUIT_KINDS[Math.floor(Math.random() * FRUIT_KINDS.length)];

            const x = 60 + Math.random() * (GAME_WIDTH - 120);
            fruits.push(new FruitObject(kind, x));
        }

        function spawnWave() {
            const doubleChance = Math.min(score / 2200, 0.45);
            const tripleChance = Math.min(score / 6000, 0.22);
            const r = Math.random();
            let count = 1;
            if (r < tripleChance) count = 3;
            else if (r < tripleChance + doubleChance) count = 2;
            for (let i = 0; i < count; i++) spawnObject();
        }

        function pointSegmentDistance(px, py, x1, y1, x2, y2) {
            const dx = x2 - x1, dy = y2 - y1;
            const lenSq = dx * dx + dy * dy;
            let t = lenSq === 0 ? 0 : ((px - x1) * dx + (py - y1) * dy) / lenSq;
            t = Math.max(0, Math.min(1, t));
            const cx = x1 + t * dx, cy = y1 + t * dy;
            return Math.hypot(px - cx, py - cy);
        }

        function sliceFruitVisual(obj, dirAngle) {
            const spread = 3 + Math.random() * 1.5;
            halves.push(new FruitHalf(
                obj.x, obj.y, obj.radius, obj.colorMain, obj.juiceColor, dirAngle,
                Math.cos(dirAngle + Math.PI / 2) * spread + obj.vx * 0.4, -4 - Math.random() * 2
            ));
            halves.push(new FruitHalf(
                obj.x, obj.y, obj.radius, obj.colorMain, obj.juiceColor, dirAngle + Math.PI,
                Math.cos(dirAngle - Math.PI / 2) * spread + obj.vx * 0.4, -4 - Math.random() * 2
            ));
        }

        function triggerBombExplosion(bomb) {
            if (gameEnding || gameState !== 'PLAYING') return;
            shake = 25;
            createExplosionParticles(bomb.x, bomb.y);
            floatingTexts.push(new FloatingText(GAME_WIDTH / 2, GAME_HEIGHT / 2, 'BOOM!', '#ff3300', 40));
            SoundEngine.playBombExplode();
            loseLife('bomb');
        }

        function sliceObject(obj, dirAngle) {
            if (obj.sliced) return;
            obj.sliced = true;

            if (obj.kind === 'bomb') {
                triggerBombExplosion(obj);
                return;
            }

            comboCount++;
            comboTimer = 45;

            const bonus = comboCount >= 2 ? comboCount * 5 : 0;
            score += obj.points + bonus;

            sliceFruitVisual(obj, dirAngle);
            createJuice(obj.x, obj.y, obj.juiceColor, obj.kind === 'star' ? 24 : 14);

            floatingTexts.push(new FloatingText(obj.x, obj.y, `+${obj.points + bonus}`, '#ffffff', 18));
            if (obj.kind === 'star') {
                floatingTexts.push(new FloatingText(obj.x, obj.y - 30, 'BONUS!', '#ffd700', 22));
            }
            if (comboCount >= 3) {
                SoundEngine.playCombo(comboCount);
            } else {
                SoundEngine.playSlice(comboCount);
            }
        }

        function checkSlice(p1, p2) {
            const dirAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x) + Math.PI / 2;
            for (const obj of fruits) {
                if (obj.sliced) continue;
                const d = pointSegmentDistance(obj.x, obj.y, p1.x, p1.y, p2.x, p2.y);
                if (d <= obj.radius + 6) sliceObject(obj, dirAngle);
            }
        }

        function loseLife(cause = 'lives') {
            if (gameEnding || gameState !== 'PLAYING') return;
            lives--;
            comboCount = 0;
            comboTimer = 0;
            if (cause !== 'bomb') SoundEngine.playMissLife();
            if (lives <= 1) SoundEngine.setDanger(true);
            if (lives <= 0) {
                gameEnding = true;
                setTimeout(() => endGame(cause), cause === 'bomb' ? 650 : 150);
            }
        }

        function updateFruits() {
            spawnTimer -= frameScale;
            if (spawnTimer <= 0) {
                spawnWave();
                spawnTimer = computeSpawnInterval();
            }

            for (let i = fruits.length - 1; i >= 0; i--) {
                const obj = fruits[i];
                obj.update(frameScale);
                if (obj.y - obj.radius > GAME_HEIGHT + 20) {
                    if (!obj.sliced && obj.kind !== 'bomb') {
                        loseLife();
                    }
                    fruits.splice(i, 1);
                    continue;
                }
                if (obj.sliced) fruits.splice(i, 1);
            }
        }

        function updateEffects() {
            for (let i = halves.length - 1; i >= 0; i--) {
                halves[i].update(frameScale);
                if (halves[i].life <= 0 || halves[i].y > GAME_HEIGHT + 100) halves.splice(i, 1);
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(frameScale);
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].update(frameScale);
                if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
            }
            if (comboTimer > 0) {
                comboTimer -= frameScale;
                if (comboTimer <= 0) comboCount = 0;
            }
        }

        function drawBladeTrail() {
            const now = Date.now();
            bladePoints = bladePoints.filter(p => now - p.t < 160);
            for (let i = 1; i < bladePoints.length; i++) {
                const p0 = bladePoints[i - 1], p1 = bladePoints[i];
                const age = (now - p1.t) / 160;
                const alpha = Math.max(0, 1 - age);
                ctx.beginPath();
                ctx.moveTo(p0.x, p0.y);
                ctx.lineTo(p1.x, p1.y);
                ctx.lineWidth = 10 * alpha + 2;
                ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 20 * alpha;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
        }

        function gameLoop(timestamp = 0) {
            requestAnimationFrame(gameLoop);

            if (!lastFrameTime) {
                lastFrameTime = timestamp;
                frameScale = 1;
            } else {
                const elapsed = timestamp - lastFrameTime;
                lastFrameTime = timestamp;
                frameScale = Math.min(elapsed / (1000 / 60), 2);
            }

            if (shake > 0) {
                ctx.save();
                const dx = Math.random() * shake - shake / 2;
                const dy = Math.random() * shake - shake / 2;
                ctx.translate(dx, dy);
                shake -= frameScale;
            } else {
                ctx.save();
            }

            drawBackground();

            if (gameState === 'PLAYING') {
                if (!gameEnding) updateFruits();
                updateEffects();

                for (const obj of fruits) obj.draw(ctx);
                for (const h of halves) h.draw(ctx);
                for (const p of particles) p.draw(ctx);
                drawBladeTrail();
                for (const ft of floatingTexts) ft.draw(ctx);

                drawHUD();
            }

            ctx.restore();
        }

        function initGame() {
            SoundEngine.init();
            SoundEngine.playStart();

            fruits = [];
            halves = [];
            particles = [];
            floatingTexts = [];
            bladePoints = [];

            score = 0;
            lives = MAX_LIVES;
            comboCount = 0;
            comboTimer = 0;
            spawnTimer = 50;
            gameEnding = false;

            gameState = 'PLAYING';
            uiLayer.classList.add('hidden');
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            gameOverTitle.classList.remove('shake-constant');

            SoundEngine.setDanger(false);
            SoundEngine.startMusic();
        }

        function endGame(reason) {
            gameState = 'GAMEOVER';
            gameEnding = false;
            isSlicing = false;
            SoundEngine.stopMusic();
            SoundEngine.playGameOver();

            gameOverTitle.textContent = reason === 'bomb' ? 'VOCÊ EXPLODIU!' : 'SEM VIDAS!';
            finalScoreEl.innerText = score;

            uiLayer.classList.remove('hidden');
            gameOverScreen.classList.remove('hidden');
            uiLayer.style.background = 'rgba(20, 0, 0, 0.85)';
            gameOverTitle.classList.add('shake-constant');
        }

        // ==================== INPUT (mouse + touch via Pointer Events) ====================
        function getCanvasPoint(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        canvas.addEventListener('pointerdown', (e) => {
            if (gameState !== 'PLAYING' || gameEnding) return;
            isSlicing = true;
            const p = getCanvasPoint(e.clientX, e.clientY);
            bladePoints.push({ x: p.x, y: p.y, t: Date.now() });
        });

        window.addEventListener('pointermove', (e) => {
            if (!isSlicing || gameState !== 'PLAYING' || gameEnding) return;
            const p = getCanvasPoint(e.clientX, e.clientY);
            const prev = bladePoints[bladePoints.length - 1];
            bladePoints.push({ x: p.x, y: p.y, t: Date.now() });
            if (bladePoints.length > 30) bladePoints.shift();

            if (prev) {
                const dist = Math.hypot(p.x - prev.x, p.y - prev.y);
                if (dist > 4) {
                    checkSlice(prev, p);
                    SoundEngine.playSwoosh();
                }
            }
        });

        window.addEventListener('pointerup', () => { isSlicing = false; });
        window.addEventListener('pointercancel', () => { isSlicing = false; });

        document.getElementById('start-btn').addEventListener('click', initGame);
        document.getElementById('restart-btn').addEventListener('click', initGame);

        document.getElementById('home-btn').addEventListener('click', () => {
            window.location.href = '../index.html';
        });

        let isMuted = false;
        const muteBtn = document.getElementById('mute-btn');
        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            SoundEngine.setMuted(isMuted);
            muteBtn.querySelector('i').className = isMuted ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high';
        });

        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const fullscreenTarget = document.documentElement;

        function isNativeFullscreen() {
            return !!(document.fullscreenElement || document.webkitFullscreenElement);
        }

        function updateFullscreenIcon() {
            const active = isNativeFullscreen() || document.body.classList.contains('pseudo-fullscreen');
            fullscreenBtn.querySelector('i').className = active ? 'fa-solid fa-compress' : 'fa-solid fa-expand';
        }

        function toggleFullscreen() {
            const canRequest = fullscreenTarget.requestFullscreen || fullscreenTarget.webkitRequestFullscreen;
            if (canRequest) {
                if (!isNativeFullscreen()) {
                    (fullscreenTarget.requestFullscreen ? fullscreenTarget.requestFullscreen() : fullscreenTarget.webkitRequestFullscreen());
                } else {
                    (document.exitFullscreen ? document.exitFullscreen() : document.webkitExitFullscreen());
                }
            } else {
                document.body.classList.toggle('pseudo-fullscreen');
                updateFullscreenIcon();
            }
        }

        fullscreenBtn.addEventListener('click', toggleFullscreen);
        document.addEventListener('fullscreenchange', updateFullscreenIcon);
        document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

        gameLoop();
    </script>
</body>
</html>
